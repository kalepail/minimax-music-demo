<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>MiniMax Music 2.6 — Demo</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #0b0d12;
				--panel: #131722;
				--border: #232a3a;
				--text: #e6ebf5;
				--muted: #8a93a6;
				--accent: #7c5cff;
				--accent-hover: #9079ff;
				--danger: #ff6b6b;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font: 15px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
			}
			main {
				max-width: 720px;
				margin: 48px auto;
				padding: 0 20px;
			}
			h1 {
				margin: 0 0 4px;
				font-size: 24px;
			}
			.sub {
				color: var(--muted);
				margin-bottom: 24px;
			}
			.panel {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 20px;
			}
			label {
				display: block;
				font-size: 13px;
				color: var(--muted);
				margin-bottom: 6px;
			}
			textarea,
			select {
				width: 100%;
				background: #0e121b;
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 10px 12px;
				font: inherit;
				resize: vertical;
			}
			textarea {
				min-height: 88px;
			}
			.row {
				display: flex;
				gap: 12px;
				margin-top: 14px;
				flex-wrap: wrap;
			}
			.row > div {
				flex: 1;
				min-width: 180px;
			}
			.checkbox {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-top: 14px;
				color: var(--muted);
			}
			button {
				margin-top: 18px;
				width: 100%;
				background: var(--accent);
				color: white;
				border: 0;
				border-radius: 8px;
				padding: 12px 16px;
				font: 600 15px inherit;
				cursor: pointer;
			}
			button:hover:not(:disabled) {
				background: var(--accent-hover);
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			.status {
				margin-top: 16px;
				font-size: 13px;
				color: var(--muted);
				min-height: 18px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			}
			.status.error {
				color: var(--danger);
			}
			audio {
				width: 100%;
				margin-top: 16px;
			}
			.hint {
				font-size: 12px;
				color: var(--muted);
				margin-top: 6px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				word-break: break-all;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>MiniMax Music 2.6</h1>
			<p class="sub">Async job flow: a Durable Object runs generation in the background while the browser polls for status.</p>

			<form id="form" class="panel">
				<label for="prompt">Prompt</label>
				<textarea
					id="prompt"
					required
					maxlength="2000"
					placeholder="An upbeat synthwave track about coding at midnight, driving 4/4 beat, glowing arpeggios"
				></textarea>

				<label for="lyrics" style="margin-top: 14px">Lyrics (optional — leave blank to auto-generate)</label>
				<textarea
					id="lyrics"
					maxlength="3500"
					placeholder="Leave blank to let lyrics_optimizer write lyrics from your prompt, or paste your own (use newlines between lines)"
				></textarea>

				<div class="row">
					<div>
						<label for="format">Format</label>
						<select id="format">
							<option value="mp3" selected>mp3</option>
							<option value="wav">wav</option>
						</select>
					</div>
					<div>
						<label>&nbsp;</label>
						<div class="checkbox">
							<input type="checkbox" id="instrumental" />
							<label for="instrumental" style="margin: 0">Instrumental (no vocals)</label>
						</div>
					</div>
				</div>

				<button type="submit" id="go">Generate song</button>
				<div id="status" class="status"></div>
			</form>

			<audio id="player" controls preload="none" style="display: none"></audio>
			<p id="source" class="hint"></p>
		</main>

		<script>
			const form = document.getElementById("form");
			const promptEl = document.getElementById("prompt");
			const lyricsEl = document.getElementById("lyrics");
			const formatEl = document.getElementById("format");
			const instrumentalEl = document.getElementById("instrumental");
			const button = document.getElementById("go");
			const statusEl = document.getElementById("status");
			const player = document.getElementById("player");
			const sourceEl = document.getElementById("source");

			const POLL_INTERVAL_MS = 3000;
			const POLL_TIMEOUT_MS = 15 * 60 * 1000;

			instrumentalEl.addEventListener("change", () => {
				lyricsEl.disabled = instrumentalEl.checked;
				if (instrumentalEl.checked) lyricsEl.value = "";
			});

			const existingJobId = readJobFromHash();
			if (existingJobId) {
				button.disabled = true;
				statusEl.textContent = `Reconnecting to job ${existingJobId}...`;
				pollJob(existingJobId).catch((err) => fail(err && err.message ? err.message : String(err)));
			}

			form.addEventListener("submit", async (e) => {
				e.preventDefault();
				const prompt = promptEl.value.trim();
				if (!prompt) return;

				button.disabled = true;
				statusEl.classList.remove("error");
				statusEl.textContent = "Submitting job...";
				player.style.display = "none";
				player.removeAttribute("src");
				sourceEl.textContent = "";

				const body = {
					prompt,
					format: formatEl.value,
					is_instrumental: instrumentalEl.checked,
				};
				if (!instrumentalEl.checked && lyricsEl.value.trim()) {
					body.lyrics = lyricsEl.value.trim();
				}

				try {
					const res = await fetch("/api/generate", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify(body),
					});
					const data = await res.json();
					if (!res.ok || !data.jobId) throw new Error(data.error || `submit failed: ${res.status}`);
					writeJobToHash(data.jobId);
					await pollJob(data.jobId);
				} catch (err) {
					fail(err && err.message ? err.message : String(err));
				}
			});

			async function pollJob(jobId) {
				const started = Date.now();
				sourceEl.textContent = `job_id=${jobId}`;
				while (Date.now() - started < POLL_TIMEOUT_MS) {
					const res = await fetch(`/api/status/${jobId}`);
					const data = await res.json();
					const elapsed = Math.floor((Date.now() - started) / 1000);
					statusEl.textContent = `state=${data.state ?? "?"} attempts=${data.attempts ?? 0} elapsed=${elapsed}s`;
					if (data.state === "complete") {
						player.src = `/api/audio/${jobId}`;
						player.style.display = "block";
						player.play().catch(() => {});
						statusEl.textContent = `state=complete attempts=${data.attempts} elapsed=${elapsed}s`;
						sourceEl.textContent = `job_id=${jobId}`;
						button.disabled = false;
						return;
					}
					if (data.state === "failed") {
						fail(data.error || "job failed");
						sourceEl.textContent = formatAttempts(data.attempt_log);
						return;
					}
					await sleep(POLL_INTERVAL_MS);
				}
				fail("timed out waiting for job");
			}

			function fail(message) {
				statusEl.classList.add("error");
				statusEl.textContent = `error: ${message}`;
				button.disabled = false;
			}

			function formatAttempts(log) {
				if (!Array.isArray(log) || log.length === 0) return "";
				return log
					.map((a) => `#${a.attempt} ${a.duration_ms}ms${a.error ? ` err=${a.error}` : ""}`)
					.join(" | ");
			}

			function sleep(ms) {
				return new Promise((r) => setTimeout(r, ms));
			}

			function readJobFromHash() {
				const params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
				const id = params.get("job");
				return id && /^[A-Za-z0-9_-]+$/.test(id) ? id : null;
			}

			function writeJobToHash(id) {
				window.location.hash = `job=${id}`;
			}
		</script>
	</body>
</html>
