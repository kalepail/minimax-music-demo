<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>MiniMax Music 2.6 — Demo</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #0b0d12;
				--panel: #131722;
				--border: #232a3a;
				--text: #e6ebf5;
				--muted: #8a93a6;
				--accent: #7c5cff;
				--accent-hover: #9079ff;
				--danger: #ff6b6b;
				--ok: #4bd6a6;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font: 15px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
			}
			main {
				max-width: 980px;
				margin: 48px auto;
				padding: 0 20px;
			}
			h1 {
				margin: 0 0 4px;
				font-size: 24px;
			}
			.sub {
				color: var(--muted);
				margin-bottom: 24px;
			}
			.panel {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 20px;
			}
			.grid {
				display: grid;
				grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
				gap: 18px;
				margin-top: 28px;
			}
			.section-title {
				margin: 0 0 12px;
				font-size: 16px;
			}
			label {
				display: block;
				font-size: 13px;
				color: var(--muted);
				margin-bottom: 6px;
			}
			textarea,
			select {
				width: 100%;
				background: #0e121b;
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 10px 12px;
				font: inherit;
				resize: vertical;
			}
			textarea {
				min-height: 88px;
			}
			.row {
				display: flex;
				gap: 12px;
				margin-top: 14px;
				flex-wrap: wrap;
			}
			.row > div {
				flex: 1;
				min-width: 180px;
			}
			.checkbox {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-top: 14px;
				color: var(--muted);
			}
			button {
				margin-top: 18px;
				width: 100%;
				background: var(--accent);
				color: white;
				border: 0;
				border-radius: 8px;
				padding: 12px 16px;
				font: 600 15px inherit;
				cursor: pointer;
			}
			button.secondary {
				background: #20283a;
				color: var(--text);
				border: 1px solid var(--border);
			}
			button.secondary:hover:not(:disabled) {
				background: #2a344b;
			}
			button:hover:not(:disabled) {
				background: var(--accent-hover);
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			.status {
				margin-top: 16px;
				font-size: 13px;
				color: var(--muted);
				min-height: 18px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			}
			.status.error {
				color: var(--danger);
			}
			audio {
				width: 100%;
				margin-top: 16px;
			}
			.hint {
				font-size: 12px;
				color: var(--muted);
				margin-top: 6px;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				word-break: break-all;
			}
			.station-bar {
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
				color: var(--muted);
				font-size: 13px;
				margin-bottom: 14px;
			}
			.pill {
				border: 1px solid var(--border);
				border-radius: 999px;
				padding: 3px 9px;
				background: #0e121b;
			}
			.song-list,
			.library-cards {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
				gap: 10px;
				margin-top: 12px;
			}
			.song {
				border: 1px solid var(--border);
				border-radius: 8px;
				background: #0e121b;
				padding: 12px;
			}
			.song button {
				margin-top: 10px;
				padding: 8px 10px;
			}
			.song-title {
				font-weight: 700;
			}
			.song-meta {
				color: var(--muted);
				font-size: 12px;
				margin-top: 4px;
			}
			.song.compact {
				padding: 0;
				overflow: hidden;
				min-width: 0;
			}
			.cover {
				aspect-ratio: 1;
				background:
					linear-gradient(135deg, rgba(124, 92, 255, 0.42), rgba(75, 214, 166, 0.18)),
					#0e121b;
				border-bottom: 1px solid var(--border);
				display: grid;
				place-items: center;
				overflow: hidden;
			}
			.cover img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			.cover-fallback {
				width: 44%;
				aspect-ratio: 1;
				border: 1px solid rgba(230, 235, 245, 0.24);
				transform: rotate(45deg);
				background: rgba(230, 235, 245, 0.04);
			}
			.song-body {
				padding: 10px;
			}
			.song.compact .song-title {
				font-size: 13px;
				line-height: 1.25;
				display: -webkit-box;
				-webkit-box-orient: vertical;
				-webkit-line-clamp: 2;
				overflow: hidden;
			}
			.song.compact .song-meta {
				display: -webkit-box;
				-webkit-box-orient: vertical;
				-webkit-line-clamp: 2;
				overflow: hidden;
			}
			.song.compact button {
				margin-top: 9px;
				padding: 7px 9px;
			}
			.request-list {
				margin-top: 12px;
				display: grid;
				gap: 8px;
				color: var(--muted);
				font-size: 13px;
			}
			.request-item {
				border-left: 2px solid var(--accent);
				padding-left: 9px;
			}
			.control-strip {
				display: grid;
				grid-template-columns: repeat(3, minmax(0, 1fr));
				gap: 10px;
				margin: 12px 0;
			}
			.library-grid {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 10px;
			}
			.library-actions {
				display: flex;
				gap: 10px;
			}
			.library-actions button {
				width: auto;
				flex: 1;
			}
			.tag-row {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				margin-top: 8px;
			}
			.tag {
				border: 1px solid var(--border);
				border-radius: 999px;
				color: var(--muted);
				font-size: 11px;
				padding: 2px 7px;
			}
			#stationPlayer {
				margin-top: 8px;
			}
			@media (max-width: 760px) {
				main {
					margin-top: 24px;
				}
				.grid {
					grid-template-columns: 1fr;
				}
				.control-strip,
				.library-grid {
					grid-template-columns: 1fr;
				}
				.song-list,
				.library-cards {
					grid-template-columns: repeat(2, minmax(0, 1fr));
				}
			}
		</style>
	</head>
	<body>
		<main>
			<h1>MiniMax Music 2.6</h1>
			<p class="sub">Generate single songs, or tune into the always-filling station backed by Queues, Durable Objects, Workers AI, and R2.</p>

			<form id="form" class="panel">
				<label for="prompt">Prompt</label>
				<textarea
					id="prompt"
					required
					maxlength="2000"
					placeholder="An upbeat synthwave track about coding at midnight, driving 4/4 beat, glowing arpeggios"
				></textarea>

				<label for="lyrics" style="margin-top: 14px">Lyrics (optional — leave blank to auto-generate)</label>
				<textarea
					id="lyrics"
					maxlength="3500"
					placeholder="Leave blank to let lyrics_optimizer write lyrics from your prompt, or paste your own (use newlines between lines)"
				></textarea>

				<div class="row">
					<div>
						<label for="format">Format</label>
						<select id="format">
							<option value="mp3" selected>mp3</option>
							<option value="wav">wav</option>
						</select>
					</div>
					<div>
						<label>&nbsp;</label>
						<div class="checkbox">
							<input type="checkbox" id="instrumental" />
							<label for="instrumental" style="margin: 0">Instrumental (no vocals)</label>
						</div>
					</div>
				</div>

				<button type="submit" id="go">Generate song</button>
				<div id="status" class="status"></div>
			</form>

			<audio id="player" controls preload="none" style="display: none"></audio>
			<p id="source" class="hint"></p>

			<div class="grid">
				<section class="panel">
					<h2 class="section-title">Radio station</h2>
					<div class="control-strip">
						<div>
							<label for="stationGenre">Station</label>
							<select id="stationGenre">
								<option value="">Main radio</option>
							</select>
						</div>
						<div>
							<label for="stationSort">Library sort</label>
							<select id="stationSort">
								<option value="newest" selected>Newest</option>
								<option value="oldest">Oldest</option>
								<option value="title">Title</option>
								<option value="energy">Energy</option>
							</select>
						</div>
						<div>
							<label>&nbsp;</label>
							<button type="button" id="loadLibrary" class="secondary" style="margin-top: 0">Load library</button>
						</div>
					</div>
					<div class="station-bar">
						<span class="pill" id="radioCount">songs=0</span>
						<span class="pill" id="radioInflight">in_flight=0</span>
						<span class="pill" id="radioTarget">target=10</span>
					</div>
					<audio id="stationPlayer" controls preload="none"></audio>
					<div id="nowPlaying" class="status">Loading station...</div>
					<button type="button" id="fillRadio" class="secondary">Fill station queue</button>
					<div id="playlist" class="song-list"></div>
				</section>

				<section class="panel">
					<h2 class="section-title">Listener requests</h2>
					<label for="radioPrompt">Request</label>
					<textarea
						id="radioPrompt"
						maxlength="500"
						placeholder="cosmic disco sea shanty with modular synth bass and a euphoric chorus"
					></textarea>
					<button type="button" id="sendRadioRequest">Send request</button>
					<div id="radioStatus" class="status"></div>
					<label style="margin-top: 12px">Queued</label>
					<div id="requests" class="request-list"></div>
					<label style="margin-top: 12px">Fulfilled</label>
					<div id="fulfilledRequests" class="request-list"></div>
				</section>
			</div>

			<section class="panel" style="margin-top: 18px">
				<h2 class="section-title">Library</h2>
				<div class="library-grid">
					<div>
						<label for="libraryGenre">Genre</label>
						<select id="libraryGenre">
							<option value="">All genres</option>
						</select>
					</div>
					<div>
						<label for="libraryTag">Tag</label>
						<input
							id="libraryTag"
							type="text"
							placeholder="modular synth"
							style="width: 100%; background: #0e121b; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font: inherit"
						/>
					</div>
				</div>
				<div class="library-actions">
					<button type="button" id="applyLibrary" class="secondary">Apply filters</button>
					<button type="button" id="moreLibrary" class="secondary">Load more</button>
				</div>
				<div id="libraryStatus" class="status"></div>
				<div id="library" class="library-cards"></div>
			</section>
		</main>

		<script>
			const form = document.getElementById("form");
			const promptEl = document.getElementById("prompt");
			const lyricsEl = document.getElementById("lyrics");
			const formatEl = document.getElementById("format");
			const instrumentalEl = document.getElementById("instrumental");
			const button = document.getElementById("go");
			const statusEl = document.getElementById("status");
			const player = document.getElementById("player");
			const sourceEl = document.getElementById("source");
			const stationPlayer = document.getElementById("stationPlayer");
			const nowPlayingEl = document.getElementById("nowPlaying");
			const radioCountEl = document.getElementById("radioCount");
			const radioInflightEl = document.getElementById("radioInflight");
			const radioTargetEl = document.getElementById("radioTarget");
			const playlistEl = document.getElementById("playlist");
			const fillRadioButton = document.getElementById("fillRadio");
			const stationGenreEl = document.getElementById("stationGenre");
			const stationSortEl = document.getElementById("stationSort");
			const loadLibraryButton = document.getElementById("loadLibrary");
			const radioPromptEl = document.getElementById("radioPrompt");
			const sendRadioRequestButton = document.getElementById("sendRadioRequest");
			const radioStatusEl = document.getElementById("radioStatus");
			const requestsEl = document.getElementById("requests");
			const fulfilledRequestsEl = document.getElementById("fulfilledRequests");
			const libraryGenreEl = document.getElementById("libraryGenre");
			const libraryTagEl = document.getElementById("libraryTag");
			const applyLibraryButton = document.getElementById("applyLibrary");
			const moreLibraryButton = document.getElementById("moreLibrary");
			const libraryStatusEl = document.getElementById("libraryStatus");
			const libraryEl = document.getElementById("library");

			const POLL_INTERVAL_MS = 3000;
			const POLL_TIMEOUT_MS = 15 * 60 * 1000;
			const JOB_STORAGE_KEY = "minimax-music-demo:last-job";
			const RADIO_REFRESH_MS = 5000;
			let radioStatus = null;
			let libraryCursor = "0";
			let loadedLibrarySongs = [];

			instrumentalEl.addEventListener("change", () => {
				lyricsEl.disabled = instrumentalEl.checked;
				if (instrumentalEl.checked) lyricsEl.value = "";
			});

			const existingJobId = readJobFromHash() || readJobFromStorage();
			if (existingJobId) {
				button.disabled = true;
				statusEl.textContent = `Reconnecting to job ${existingJobId}...`;
				pollJob(existingJobId).catch((err) => fail(err && err.message ? err.message : String(err)));
			}

			form.addEventListener("submit", async (e) => {
				e.preventDefault();
				const prompt = promptEl.value.trim();
				if (!prompt) return;

				button.disabled = true;
				statusEl.classList.remove("error");
				statusEl.textContent = "Submitting job...";
				player.style.display = "none";
				player.removeAttribute("src");
				sourceEl.textContent = "";

				const body = {
					prompt,
					format: formatEl.value,
					is_instrumental: instrumentalEl.checked,
				};
				if (!instrumentalEl.checked && lyricsEl.value.trim()) {
					body.lyrics = lyricsEl.value.trim();
				}

				try {
					const res = await fetch("/api/generate", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify(body),
					});
					const data = await res.json();
					if (!res.ok || !data.jobId) throw new Error(data.error || `submit failed: ${res.status}`);
					writeJobToHash(data.jobId);
					await pollJob(data.jobId);
				} catch (err) {
					fail(err && err.message ? err.message : String(err));
				}
			});

			fillRadioButton.addEventListener("click", async () => {
				fillRadioButton.disabled = true;
				radioStatusEl.classList.remove("error");
				radioStatusEl.textContent = "Filling station queue...";
				try {
					const res = await fetch("/api/radio/fill", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify(currentStationPayload()),
					});
					const data = await res.json();
					if (!res.ok) throw new Error(data.error || `fill failed: ${res.status}`);
					radioStatusEl.textContent = `queued=${data.queued} target=${data.target}`;
					await loadRadio();
				} catch (err) {
					radioFail(err && err.message ? err.message : String(err));
				} finally {
					fillRadioButton.disabled = false;
				}
			});

			sendRadioRequestButton.addEventListener("click", async () => {
				const prompt = radioPromptEl.value.trim();
				if (!prompt) return;
				sendRadioRequestButton.disabled = true;
				radioStatusEl.classList.remove("error");
				radioStatusEl.textContent = "Sending request...";
				try {
					const res = await fetch("/api/radio/request", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ prompt, ...currentStationPayload() }),
					});
					const data = await res.json();
					if (!res.ok) throw new Error(data.error || `request failed: ${res.status}`);
					radioPromptEl.value = "";
					radioStatusEl.textContent = `request saved queued=${data.queued}`;
					await loadRadio();
				} catch (err) {
					radioFail(err && err.message ? err.message : String(err));
				} finally {
					sendRadioRequestButton.disabled = false;
				}
			});

			stationGenreEl.addEventListener("change", async () => {
				clearCurrentStation();
				await loadRadio();
				resetLibrary();
				await loadLibraryPage();
			});

			loadLibraryButton.addEventListener("click", async () => {
				resetLibrary();
				await loadLibraryPage();
			});

			stationSortEl.addEventListener("change", async () => {
				resetLibrary();
				await loadLibraryPage();
			});

			libraryGenreEl.addEventListener("change", async () => {
				if (libraryGenreEl.value) stationGenreEl.value = libraryGenreEl.value;
				resetLibrary();
				await loadLibraryPage();
			});

			applyLibraryButton.addEventListener("click", async () => {
				resetLibrary();
				await loadLibraryPage();
			});

			moreLibraryButton.addEventListener("click", async () => {
				await loadLibraryPage();
			});

			stationPlayer.addEventListener("ended", () => {
				const list = radioStatus && Array.isArray(radioStatus.playlist) ? radioStatus.playlist : [];
				const currentId = stationPlayer.dataset.songId;
				const index = list.findIndex((song) => song.id === currentId);
				const next = list[index + 1] || list[0];
				if (next) playRadioSong(next);
			});

			loadStations().catch((err) => radioFail(err && err.message ? err.message : String(err)));
			loadRadio().catch((err) => radioFail(err && err.message ? err.message : String(err)));
			loadLibraryPage().catch((err) => libraryFail(err && err.message ? err.message : String(err)));
			window.setInterval(() => {
				loadRadio().catch((err) => radioFail(err && err.message ? err.message : String(err)));
			}, RADIO_REFRESH_MS);

			async function pollJob(jobId) {
				let started = Date.now();
				sourceEl.textContent = `job_id=${jobId}`;
				while (Date.now() - started < POLL_TIMEOUT_MS) {
					const res = await fetch(`/api/status/${jobId}`);
					const data = await res.json();

					if (!res.ok) {
						if (res.status === 404) clearSavedJob(jobId);
						fail(data.error || `status failed: ${res.status}`);
						return;
					}

					started = typeof data.created_at === "number" ? data.created_at : started;
					const elapsed = Math.max(0, Math.floor((Date.now() - started) / 1000));
					statusEl.textContent = `state=${data.state ?? "?"} attempts=${data.attempts ?? 0} elapsed=${elapsed}s`;
					if (data.state === "complete") {
						player.src = `/api/audio/${jobId}?v=${data.completed_at ?? Date.now()}`;
						player.style.display = "block";
						player.load();
						statusEl.textContent = `state=complete attempts=${data.attempts} elapsed=${elapsed}s`;
						sourceEl.textContent = `job_id=${jobId}`;
						button.disabled = false;
						return;
					}
					if (data.state === "failed") {
						fail(data.error || "job failed");
						sourceEl.textContent = formatAttempts(data.attempt_log);
						return;
					}
					await sleep(POLL_INTERVAL_MS);
				}
				fail("timed out waiting for job");
			}

			function fail(message) {
				statusEl.classList.add("error");
				statusEl.textContent = `error: ${message}`;
				button.disabled = false;
			}

			function formatAttempts(log) {
				if (!Array.isArray(log) || log.length === 0) return "";
				return log
					.map((a) => `#${a.attempt} ${a.duration_ms}ms${a.error ? ` err=${a.error}` : ""}`)
					.join(" | ");
			}

			function sleep(ms) {
				return new Promise((r) => setTimeout(r, ms));
			}

			function readJobFromHash() {
				const params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
				const id = params.get("job");
				return id && /^[A-Za-z0-9_-]+$/.test(id) ? id : null;
			}

			function readJobFromStorage() {
				const id = window.localStorage.getItem(JOB_STORAGE_KEY);
				return id && /^[A-Za-z0-9_-]+$/.test(id) ? id : null;
			}

			function writeJobToHash(id) {
				window.location.hash = `job=${id}`;
				window.localStorage.setItem(JOB_STORAGE_KEY, id);
			}

			function clearSavedJob(id) {
				const saved = window.localStorage.getItem(JOB_STORAGE_KEY);
				if (saved === id) window.localStorage.removeItem(JOB_STORAGE_KEY);
			}

			async function loadRadio() {
				const res = await fetch(`/api/radio/status${stationQueryString()}`);
				const data = await res.json();
				if (!res.ok) throw new Error(data.error || `radio status failed: ${res.status}`);
				radioStatus = data;
				renderRadio(data);
			}

			function renderRadio(data) {
				const playlist = Array.isArray(data.playlist) ? data.playlist : [];
				const requests = Array.isArray(data.requests) ? data.requests : [];
				const fulfilledRequests = Array.isArray(data.fulfilled_requests) ? data.fulfilled_requests : [];
				const inFlight = Array.isArray(data.in_flight) ? data.in_flight : [];
				radioCountEl.textContent = `songs=${playlist.length}`;
				radioInflightEl.textContent = `in_flight=${inFlight.length}`;
				radioTargetEl.textContent = `target=${data.target_backlog ?? 10}`;

				if (!stationPlayer.dataset.songId && playlist[0]) {
					playRadioSong(playlist[0], false);
				}
				if (!playlist[0] && inFlight.length > 0) {
					nowPlayingEl.textContent = "Songs are generating. The station will start when the first track lands.";
				}
				if (!playlist[0] && inFlight.length === 0) {
					nowPlayingEl.textContent = "No station tracks yet. Fill the queue to start generating.";
				}

				playlistEl.innerHTML = "";
				for (const song of playlist.slice(0, 20)) {
					playlistEl.append(renderSongCard(song, true));
				}

				requestsEl.innerHTML = "";
				for (const request of requests.slice(0, 10)) {
					const item = document.createElement("div");
					item.className = "request-item";
					item.textContent = request.text;
					requestsEl.append(item);
				}
				if (requests.length === 0) {
					const item = document.createElement("div");
					item.className = "request-item";
					item.textContent = "No queued requests";
					requestsEl.append(item);
				}

				fulfilledRequestsEl.innerHTML = "";
				for (const request of fulfilledRequests.slice(0, 10)) {
					const item = document.createElement("div");
					item.className = "request-item";
					item.textContent = `${request.text} -> ${request.song_title}`;
					item.addEventListener("click", () => {
						const song = playlist.find((entry) => entry.id === request.song_id);
						if (song) playRadioSong(song);
					});
					fulfilledRequestsEl.append(item);
				}
				if (fulfilledRequests.length === 0) {
					const item = document.createElement("div");
					item.className = "request-item";
					item.textContent = "No fulfilled requests yet";
					fulfilledRequestsEl.append(item);
				}
			}

			async function loadStations() {
				const res = await fetch("/api/radio/stations");
				const data = await res.json();
				if (!res.ok) throw new Error(data.error || `station list failed: ${res.status}`);
				const genres = Array.isArray(data.genres) ? data.genres : [];
				const currentStation = stationGenreEl.value;
				const currentLibrary = libraryGenreEl.value;
				stationGenreEl.innerHTML = '<option value="">Main radio</option>';
				libraryGenreEl.innerHTML = '<option value="">All genres</option>';
				for (const genre of genres) {
					const value = genre.genre;
					const stationOption = document.createElement("option");
					stationOption.value = value;
					stationOption.textContent = `${value} (${genre.count})`;
					stationGenreEl.append(stationOption);
					const libraryOption = stationOption.cloneNode(true);
					libraryGenreEl.append(libraryOption);
				}
				stationGenreEl.value = currentStation;
				libraryGenreEl.value = currentLibrary;
			}

			async function loadLibraryPage() {
				libraryStatusEl.classList.remove("error");
				libraryStatusEl.textContent = "Loading library...";
				const params = new URLSearchParams({
					limit: "25",
					cursor: libraryCursor,
					sort: stationSortEl.value,
				});
				const genre = libraryGenreEl.value || stationGenreEl.value;
				if (genre) params.set("genre", genre);
				if (libraryTagEl.value.trim()) params.set("tag", libraryTagEl.value.trim());
				const res = await fetch(`/api/library?${params.toString()}`);
				const data = await res.json();
				if (!res.ok) throw new Error(data.error || `library failed: ${res.status}`);
				const songs = Array.isArray(data.songs) ? data.songs : [];
				loadedLibrarySongs = [...loadedLibrarySongs, ...songs];
				libraryCursor = data.next_cursor || "";
				moreLibraryButton.disabled = !libraryCursor;
				libraryStatusEl.textContent = `loaded=${loadedLibrarySongs.length}${libraryCursor ? "" : " end=true"}`;
				renderLibrary();
			}

			function resetLibrary() {
				libraryCursor = "0";
				loadedLibrarySongs = [];
				libraryEl.innerHTML = "";
				moreLibraryButton.disabled = false;
			}

			function renderLibrary() {
				libraryEl.innerHTML = "";
				for (const song of loadedLibrarySongs) {
					libraryEl.append(renderSongCard(song, true));
				}
			}

			function playRadioSong(song, autoplay = true) {
				stationPlayer.dataset.songId = song.id;
				stationPlayer.src = `/api/radio/audio/${song.id}?v=${song.completed_at || Date.now()}`;
				nowPlayingEl.textContent = `Now playing: ${song.title || "Untitled Signal"}`;
				stationPlayer.load();
				if (autoplay) stationPlayer.play().catch(() => {});
			}

			function renderSongCard(song, includeTags = false) {
				const item = document.createElement("article");
				item.className = "song compact";
				const cover = document.createElement("div");
				cover.className = "cover";
				const fallback = document.createElement("div");
				fallback.className = "cover-fallback";
				if (song.id) {
					const img = document.createElement("img");
					img.src = `/api/radio/cover/${song.id}?v=${song.cover_art_created_at || song.completed_at || Date.now()}`;
					img.alt = "";
					img.loading = "lazy";
					img.addEventListener("error", () => {
						img.remove();
						if (!cover.contains(fallback)) cover.append(fallback);
					});
					cover.append(img);
				} else {
					cover.append(fallback);
				}
				item.append(cover);
				const body = document.createElement("div");
				body.className = "song-body";
				const title = document.createElement("div");
				title.className = "song-title";
				title.textContent = song.title || "Untitled Signal";
				const meta = document.createElement("div");
				meta.className = "song-meta";
				meta.textContent = [
					new Date(song.completed_at).toLocaleString(),
					song.primary_genre,
					typeof song.energy === "number" ? `energy ${song.energy}` : "",
					song.request_text ? `request: ${song.request_text}` : "",
				].filter(Boolean).join(" · ");
				const play = document.createElement("button");
				play.type = "button";
				play.className = "secondary";
				play.textContent = "Play";
				play.addEventListener("click", () => playRadioSong(song));
				body.append(title, meta);
				if (includeTags && Array.isArray(song.tags) && song.tags.length > 0) {
					const tags = document.createElement("div");
					tags.className = "tag-row";
					for (const tag of song.tags.slice(0, 3)) {
						const pill = document.createElement("span");
						pill.className = "tag";
						pill.textContent = tag;
						tags.append(pill);
					}
					body.append(tags);
				}
				body.append(play);
				item.append(body);
				return item;
			}

			function radioFail(message) {
				radioStatusEl.classList.add("error");
				radioStatusEl.textContent = `error: ${message}`;
			}

			function libraryFail(message) {
				libraryStatusEl.classList.add("error");
				libraryStatusEl.textContent = `error: ${message}`;
			}

			function currentStationPayload() {
				const genre = stationGenreEl.value;
				return genre ? { genre } : { station_id: "main" };
			}

			function stationQueryString() {
				const genre = stationGenreEl.value;
				return genre ? `?genre=${encodeURIComponent(genre)}` : "";
			}

			function clearCurrentStation() {
				stationPlayer.removeAttribute("src");
				delete stationPlayer.dataset.songId;
				nowPlayingEl.textContent = "Loading station...";
			}
		</script>
	</body>
</html>
